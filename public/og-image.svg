<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0b"/>
      <stop offset="100%" style="stop-color:#1a1a1b"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fbbf24" stroke-width="1"/>
    <line x1="0" y1="630" x2="1200" y2="0" stroke="#fbbf24" stroke-width="1"/>
    <circle cx="600" cy="315" r="200" fill="none" stroke="#fbbf24" stroke-width="1"/>
    <circle cx="600" cy="315" r="300" fill="none" stroke="#fbbf24" stroke-width="0.5"/>
  </g>

  <!-- Logo -->
  <rect x="100" y="80" width="80" height="80" rx="16" fill="url(#logoGrad)"/>
  <text x="140" y="140" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="#000" text-anchor="middle">X</text>
  <text x="200" y="135" font-family="system-ui, sans-serif" font-size="36" font-weight="600" fill="#fff">X1000</text>

  <!-- Main Title -->
  <text x="600" y="280" font-family="system-ui, sans-serif" font-size="72" font-weight="300" fill="#fff" text-anchor="middle">Build</text>
  <text x="600" y="370" font-family="system-ui, sans-serif" font-size="96" font-weight="600" fill="url(#textGrad)" text-anchor="middle">1000x Leverage</text>

  <!-- Subtitle -->
  <text x="600" y="450" font-family="system-ui, sans-serif" font-size="28" fill="#ffffff80" text-anchor="middle">The Leverage Operating System</text>

  <!-- Stats -->
  <g transform="translate(200, 520)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#fbbf24">243+</text>
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff60">Systems</text>
  </g>
  <g transform="translate(400, 520)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#fbbf24">V5.3</text>
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff60">Standard</text>
  </g>
  <g transform="translate(600, 520)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#fbbf24">6</text>
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff60">Verticals</text>
  </g>
  <g transform="translate(800, 520)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#fbbf24">24/7</text>
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff60">AI Agents</text>
  </g>

  <!-- URL -->
  <text x="1100" y="590" font-family="system-ui, sans-serif" font-size="20" fill="#ffffff40" text-anchor="end">x1000.ai</text>
</svg>
